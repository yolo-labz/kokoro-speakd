# git-cliff config for kokoro-speakd.
#
# Generates Keep-a-Changelog 1.1.0 sections from Conventional Commits.
# Run locally:
#   git cliff --output CHANGELOG.md
# Run for the next release (after tagging):
#   git cliff --tag vX.Y.Z --output CHANGELOG.md
#
# Authoritative source for "release engineering" cross-org per
# ~/.claude/CLAUDE.md §Release engineering: CHANGELOG.md is
# auto-generated, never hand-edited.

[changelog]
header = "# Changelog\n\nAll notable changes to this project are documented here.\n\n"
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^doc", group = "Documentation" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^chore", group = "Miscellaneous Tasks" },
  { message = "^ci", group = "CI" },
]
tag_pattern = "v[0-9].*"
