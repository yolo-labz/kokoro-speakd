sonar.projectKey=yolo-labz_kokoro-speakd
sonar.projectName=kokoro-speakd
sonar.organization=yolo-labz

# Source roots (flat Python layout at repo root)
sonar.sources=client.py,daemon.py,markdown.py
sonar.tests=tests

# Python analysis
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Scanner hygiene
sonar.sourceEncoding=UTF-8
sonar.exclusions=**/__pycache__/**,**/*.egg-info/**,dist/**,build/**,result/**,.venv/**
