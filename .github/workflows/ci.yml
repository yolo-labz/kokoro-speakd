name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# No untrusted event inputs are consumed anywhere in this workflow.
# All `run:` steps invoke static commands against the checked-out source only.
permissions:
  contents: read

jobs:
  flake-check:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
      - name: nix flake check
        run: nix flake check --accept-flake-config --show-trace
      - name: Build kokoro-speakd
        run: nix build .#kokoro-speakd --accept-flake-config
      - name: Build kokoro-speak
        run: nix build .#kokoro-speak --accept-flake-config
