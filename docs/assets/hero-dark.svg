  <title id="kokoro-hero-title">kokoro-speakd: persistent Kokoro TTS daemon for Claude Code</title>
  <desc id="kokoro-hero-desc">Catppuccin Mocha card. Left panel shows the wordmark kokoro-speakd in mauve over a monospaced tagline. Right panel shows a continuous sine waveform with amplitude bars rising beneath it and a small speaker glyph anchoring the lower-right corner.</desc>
